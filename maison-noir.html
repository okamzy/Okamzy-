<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAISON NOIR — Fine Dining Miami</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --black: #080608;
  --dark: #0e0b0e;
  --card: #131013;
  --gold: #c8a96e;
  --gold2: #e8d5a3;
  --cream: #f5f0e8;
  --muted: #6a5f58;
  --red: #c0392b;
  --white: #ffffff;
}

html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--cream);
  font-family: 'Jost', sans-serif;
  overflow-x: hidden;
  cursor: none;
}

/* CURSOR */
.cursor {
  position: fixed; width: 8px; height: 8px;
  background: var(--gold); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  transition: width 0.2s, height 0.2s;
  mix-blend-mode: difference;
}
.cursor-ring {
  position: fixed; width: 38px; height: 38px;
  border: 1px solid rgba(200,169,110,0.5); border-radius: 50%;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%,-50%);
  transition: all 0.1s ease-out;
}

/* LOADER */
.loader {
  position: fixed; inset: 0; z-index: 1000;
  background: var(--black);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
.loader.hidden { opacity: 0; visibility: hidden; }
.loader-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3rem; font-weight: 300; letter-spacing: 0.4em;
  color: var(--gold); animation: pulse 1.5s ease infinite;
}
.loader-line {
  width: 0; height: 1px; background: var(--gold);
  margin-top: 1.5rem;
  animation: loadLine 1.8s ease forwards;
}
@keyframes loadLine { to { width: 200px; } }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  display: flex; align-items: center; justify-content: space-between;
  padding: 2rem 4rem;
  transition: all 0.4s;
}
nav.scrolled {
  background: rgba(8,6,8,0.96);
  backdrop-filter: blur(20px);
  padding: 1.2rem 4rem;
  border-bottom: 1px solid rgba(200,169,110,0.1);
}
.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem; font-weight: 600;
  letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--white); text-decoration: none;
}
.logo span { color: var(--gold); }
.nav-links { display: flex; gap: 3rem; list-style: none; }
.nav-links a {
  font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(245,240,232,0.5); text-decoration: none;
  transition: color 0.2s;
}
.nav-links a:hover { color: var(--gold); }
.nav-btn {
  font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
  border: 1px solid var(--gold); color: var(--gold);
  padding: 0.6rem 1.5rem; cursor: pointer;
  background: transparent; font-family: 'Jost', sans-serif;
  transition: all 0.2s; text-decoration: none; display: inline-block;
}
.nav-btn:hover { background: var(--gold); color: var(--black); }

/* HERO */
#hero {
  height: 100vh; position: relative; overflow: hidden;
  display: flex; align-items: center;
}
.hero-bg {
  position: absolute; inset: -10%;
  background:
    radial-gradient(ellipse at 70% 60%, rgba(192,57,43,0.15), transparent 50%),
    radial-gradient(ellipse at 20% 40%, rgba(200,169,110,0.08), transparent 50%),
    linear-gradient(135deg, #0e0008 0%, #080608 40%, #0a0608 100%);
  transition: transform 0.1s ease-out;
}

/* FOOD PLATE VISUAL */
.hero-plate {
  position: absolute; right: 5%; top: 50%;
  transform: translateY(-50%);
  width: min(55vw, 700px); height: min(55vw, 700px);
  border-radius: 50%;
  background: radial-gradient(ellipse at 35% 35%,
    #2a1a0a 0%, #1a0e08 30%, #0e0806 60%, #080408 100%);
  box-shadow:
    0 0 120px rgba(192,57,43,0.15),
    0 0 60px rgba(200,169,110,0.1),
    inset 0 0 80px rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s ease-out;
}
.plate-inner {
  width: 75%; height: 75%; border-radius: 50%;
  background: radial-gradient(ellipse at 40% 40%,
    #3a2010 0%, #1e120a 40%, #100a06 100%);
  box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 0 30px rgba(200,169,110,0.05);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.plate-food {
  font-size: clamp(4rem, 10vw, 9rem);
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8));
  animation: plateFloat 5s ease-in-out infinite;
  user-select: none;
}
.plate-ring {
  position: absolute; border-radius: 50%;
  border: 1px solid rgba(200,169,110,0.08);
}
.plate-ring-1 { inset: -15px; }
.plate-ring-2 { inset: -30px; animation: ringPulse 3s ease-in-out infinite; }
.plate-ring-3 { inset: -50px; animation: ringPulse 3s ease-in-out 1s infinite; }

.plate-dots {
  position: absolute; inset: 0; border-radius: 50%;
}
.pdot {
  position: absolute; width: 6px; height: 6px;
  background: var(--gold); border-radius: 50%; opacity: 0.4;
}

@keyframes plateFloat {
  0%,100% { transform: translateY(0) rotate(0deg); }
  50% { transform: translateY(-15px) rotate(3deg); }
}
@keyframes ringPulse {
  0%,100% { opacity: 0.05; transform: scale(1); }
  50% { opacity: 0.15; transform: scale(1.02); }
}

.hero-content {
  position: relative; z-index: 10;
  padding: 0 4rem; max-width: 55%;
}
.hero-eyebrow {
  font-size: 0.6rem; letter-spacing: 0.5em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 2rem;
  display: flex; align-items: center; gap: 1rem;
  animation: fadeLeft 1s ease 0.5s both;
}
.hero-eyebrow span { width: 3rem; height: 1px; background: var(--gold); opacity: 0.5; display: block; }
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(3rem, 6vw, 6.5rem);
  font-weight: 300; line-height: 1.0;
  letter-spacing: 0.02em;
  animation: fadeLeft 1s ease 0.7s both;
}
.hero-title .accent { color: var(--gold); font-style: italic; }
.hero-title .outline {
  -webkit-text-stroke: 1px rgba(245,240,232,0.3);
  color: transparent;
}
.hero-divider {
  width: 4rem; height: 1px; background: var(--gold);
  margin: 2rem 0; animation: fadeLeft 1s ease 0.9s both;
}
.hero-desc {
  font-size: 0.82rem; line-height: 2;
  color: rgba(245,240,232,0.45); max-width: 380px;
  font-weight: 300;
  animation: fadeLeft 1s ease 1.1s both;
}
.hero-actions {
  display: flex; gap: 1rem; margin-top: 2.5rem;
  animation: fadeLeft 1s ease 1.3s both;
}
.btn-gold {
  background: var(--gold); color: var(--black);
  padding: 0.9rem 2rem; font-size: 0.65rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  border: none; cursor: pointer; font-family: 'Jost', sans-serif;
  transition: background 0.25s, transform 0.2s;
  text-decoration: none; display: inline-block;
}
.btn-gold:hover { background: var(--gold2); transform: translateY(-2px); }
.btn-ghost {
  border: 1px solid rgba(245,240,232,0.2); color: rgba(245,240,232,0.6);
  padding: 0.9rem 2rem; font-size: 0.65rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  background: transparent; cursor: pointer; font-family: 'Jost', sans-serif;
  transition: all 0.25s; text-decoration: none; display: inline-block;
}
.btn-ghost:hover { border-color: var(--gold); color: var(--gold); }

.hero-stats {
  display: flex; gap: 2.5rem; margin-top: 3.5rem;
  padding-top: 2rem; border-top: 1px solid rgba(200,169,110,0.1);
  animation: fadeLeft 1s ease 1.5s both;
}
.stat-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem; font-weight: 600; color: var(--gold); line-height: 1;
}
.stat-label { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 0.3rem; }

/* SCROLL CUE */
.scroll-cue {
  position: absolute; bottom: 2.5rem; left: 4rem; z-index: 10;
  display: flex; align-items: center; gap: 1rem;
  animation: fadeLeft 1s ease 1.7s both;
}
.scroll-cue-text { font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(245,240,232,0.3); }
.scroll-cue-line { width: 60px; height: 1px; background: linear-gradient(to right, rgba(200,169,110,0.5), transparent); }

/* TICKER */
.ticker {
  background: var(--gold); overflow: hidden; padding: 0.8rem 0;
}
.ticker-inner {
  display: flex; gap: 0; white-space: nowrap;
  animation: tickerMove 30s linear infinite;
}
.ticker-item {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.95rem; font-style: italic; font-weight: 300;
  color: var(--black); padding: 0 2.5rem; opacity: 0.85;
}
.ticker-sep { opacity: 0.4; }
@keyframes tickerMove { from{transform:translateX(0)} to{transform:translateX(-50%)} }

/* SIGNATURE SECTION */
#signature {
  display: grid; grid-template-columns: 1fr 1fr;
  min-height: 85vh;
}
.sig-visual {
  background: var(--card);
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  min-height: 500px;
}
.sig-visual-gradient {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 40% 40%, rgba(192,57,43,0.15), transparent 60%),
    radial-gradient(ellipse at 70% 70%, rgba(200,169,110,0.08), transparent 50%);
}
.sig-dishes {
  position: relative; z-index: 2;
  display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; padding: 3rem;
}
.sig-dish {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(200,169,110,0.1);
  padding: 2rem 1.5rem; text-align: center;
  transition: all 0.3s; cursor: default;
}
.sig-dish:hover {
  background: rgba(200,169,110,0.05);
  border-color: rgba(200,169,110,0.25);
  transform: translateY(-4px);
}
.sig-dish-emoji { font-size: 2.8rem; margin-bottom: 1rem; display: block; }
.sig-dish-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem; font-weight: 400; margin-bottom: 0.4rem;
}
.sig-dish-price { font-size: 0.72rem; color: var(--gold); letter-spacing: 0.1em; }

.sig-content {
  background: var(--dark);
  padding: 6rem 5rem;
  display: flex; flex-direction: column; justify-content: center;
}
.eyebrow {
  font-size: 0.6rem; letter-spacing: 0.45em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 1.5rem;
  display: flex; align-items: center; gap: 1rem;
}
.eyebrow::before { content:''; width:2rem; height:1px; background:var(--gold); display:block; opacity:0.6; }
.section-h {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.2rem, 3.5vw, 3.8rem);
  font-weight: 300; line-height: 1.1; margin-bottom: 1.5rem;
}
.section-h em { font-style: italic; color: var(--gold); }
.section-p { font-size: 0.8rem; line-height: 2; color: rgba(245,240,232,0.45); font-weight: 300; margin-bottom: 2rem; }
.features { display: flex; flex-direction: column; gap: 1.2rem; }
.feature { display: flex; align-items: flex-start; gap: 1rem; }
.feature-dot { width: 4px; height: 4px; background: var(--gold); border-radius: 50%; margin-top: 0.55rem; flex-shrink: 0; }
.feature-text { font-size: 0.78rem; color: rgba(245,240,232,0.6); line-height: 1.6; }

/* MENU */
#menu {
  padding: 9rem 4rem;
  background: var(--black);
}
.section-center { text-align: center; margin-bottom: 4rem; }
.section-center .eyebrow { justify-content: center; }
.section-center .eyebrow::before { display: none; }

.course-tabs {
  display: flex; justify-content: center; gap: 0;
  margin-bottom: 4rem;
  border-bottom: 1px solid rgba(200,169,110,0.1);
}
.course-tab {
  padding: 1rem 2rem; background: none; border: none;
  font-family: 'Jost', sans-serif;
  font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase;
  color: rgba(245,240,232,0.3); cursor: pointer;
  position: relative; transition: color 0.2s;
}
.course-tab::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 1px; background: var(--gold); transform: scaleX(0);
  transition: transform 0.3s;
}
.course-tab.active { color: var(--gold); }
.course-tab.active::after { transform: scaleX(1); }

.course-panel { display: none; }
.course-panel.active { display: block; }

.dishes-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: rgba(200,169,110,0.06);
  max-width: 1200px; margin: 0 auto;
}
.dish-card {
  background: var(--card); padding: 3rem 2.5rem;
  position: relative; overflow: hidden; cursor: default;
  transition: background 0.3s;
}
.dish-card:hover { background: #181018; }
.dish-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent, var(--gold), transparent);
  opacity: 0; transition: opacity 0.3s;
}
.dish-card:hover::before { opacity: 1; }
.dish-emoji { font-size: 2.5rem; margin-bottom: 1.5rem; display: block; }
.dish-course-tag {
  font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 0.8rem; display: block;
}
.dish-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.4rem; font-weight: 400; line-height: 1.2;
  margin-bottom: 1rem;
}
.dish-desc { font-size: 0.73rem; line-height: 1.9; color: rgba(245,240,232,0.4); margin-bottom: 2rem; }
.dish-footer { display: flex; justify-content: space-between; align-items: center; }
.dish-price {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.3rem; color: var(--gold);
}
.dish-tag {
  font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase;
  background: rgba(200,169,110,0.08); border: 1px solid rgba(200,169,110,0.15);
  color: var(--gold); padding: 0.2rem 0.6rem;
}

/* CHEF */
#chef {
  padding: 9rem 4rem;
  background: var(--dark);
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6rem; align-items: center;
  max-width: 1400px; margin: 0 auto;
}
.chef-visual {
  position: relative;
}
.chef-frame {
  aspect-ratio: 3/4;
  background: linear-gradient(135deg, #1a1018, #0e080e);
  border: 1px solid rgba(200,169,110,0.1);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.chef-frame::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(200,169,110,0.08), transparent 60%);
}
.chef-emoji { font-size: 8rem; position: relative; z-index: 2; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8)); }
.chef-badge {
  position: absolute; bottom: -1.5rem; right: -1.5rem;
  width: 120px; height: 120px; border-radius: 50%;
  background: var(--gold);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center;
}
.chef-badge-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem; font-weight: 700; color: var(--black); line-height: 1;
}
.chef-badge-label { font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(8,6,8,0.7); }
.chef-corner {
  position: absolute; top: -1rem; left: -1rem;
  width: 60px; height: 60px; border-left: 1px solid var(--gold); border-top: 1px solid var(--gold);
  opacity: 0.4;
}

/* GALLERY */
#gallery {
  padding: 0;
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  grid-template-rows: auto auto;
  gap: 2px;
  background: rgba(200,169,110,0.05);
}
.gallery-item {
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  padding: 4rem 2rem;
  position: relative; overflow: hidden;
  cursor: pointer; transition: background 0.3s;
  min-height: 280px;
}
.gallery-item:hover { background: #1a1018; }
.gallery-item:hover .gallery-emoji { transform: scale(1.1); }
.gallery-item.tall { grid-row: span 2; min-height: 560px; }
.gallery-emoji {
  font-size: clamp(4rem, 8vw, 8rem);
  filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8));
  transition: transform 0.4s ease;
  user-select: none;
}
.gallery-label {
  position: absolute; bottom: 1.5rem; left: 1.5rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.85rem; font-style: italic; color: rgba(245,240,232,0.4);
  letter-spacing: 0.05em;
}
.gallery-overlay {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.4) 100%);
}

/* EXPERIENCE */
#experience {
  padding: 9rem 4rem;
  background: var(--black);
}
.exp-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: rgba(200,169,110,0.06);
  max-width: 1200px; margin: 4rem auto 0;
}
.exp-item {
  background: var(--card); padding: 3.5rem 2rem;
  text-align: center; transition: background 0.3s;
}
.exp-item:hover { background: #181018; }
.exp-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.5rem; font-weight: 300; color: rgba(200,169,110,0.15);
  line-height: 1; margin-bottom: 1rem;
}
.exp-icon { font-size: 1.8rem; margin-bottom: 1.2rem; display: block; }
.exp-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem; font-weight: 400; margin-bottom: 0.8rem;
}
.exp-desc { font-size: 0.72rem; line-height: 1.9; color: rgba(245,240,232,0.35); }

/* RESERVE */
#reserve {
  padding: 9rem 4rem;
  background: var(--dark);
  position: relative; overflow: hidden;
}
#reserve::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(192,57,43,0.06), transparent 70%);
}
.reserve-inner { max-width: 700px; margin: 0 auto; position: relative; z-index: 2; }
.reserve-form { display: flex; flex-direction: column; gap: 1rem; margin-top: 3rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 0.4rem; }
.form-group label { font-size: 0.58rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); }
.form-group input, .form-group select, .form-group textarea {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(200,169,110,0.12);
  color: var(--cream); padding: 0.9rem 1rem;
  font-family: 'Jost', sans-serif; font-size: 0.82rem;
  outline: none; transition: border-color 0.2s; appearance: none;
}
.form-group input:focus, .form-group select:focus { border-color: var(--gold); }
.form-group select option { background: var(--dark); }
.form-submit {
  background: var(--gold); color: var(--black);
  border: none; padding: 1.1rem;
  font-family: 'Jost', sans-serif;
  font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
  cursor: pointer; transition: background 0.25s; margin-top: 0.5rem;
}
.form-submit:hover { background: var(--gold2); }
.success-reserve {
  display: none; border: 1px solid rgba(200,169,110,0.2);
  padding: 2rem; text-align: center; margin-top: 1.5rem;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem; font-style: italic; color: var(--gold);
}

/* TESTIMONIALS */
#testimonials {
  padding: 9rem 4rem;
  background: var(--black);
}
.test-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: rgba(200,169,110,0.06);
  max-width: 1200px; margin: 4rem auto 0;
}
.test-card {
  background: var(--card); padding: 3rem 2.5rem;
  transition: background 0.3s; position: relative;
}
.test-card:hover { background: #181018; }
.test-stars { color: var(--gold); font-size: 0.7rem; letter-spacing: 0.2em; margin-bottom: 1.5rem; }
.test-quote-mark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 5rem; color: rgba(200,169,110,0.1); line-height: 1;
  margin-bottom: -1rem;
}
.test-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.05rem; font-style: italic; font-weight: 300;
  line-height: 1.9; color: rgba(245,240,232,0.75);
  margin-bottom: 2rem;
}
.test-name { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }

/* FOOTER */
footer {
  background: #040304;
  padding: 5rem 4rem 2rem;
}
.footer-grid {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 3rem; padding-bottom: 4rem;
